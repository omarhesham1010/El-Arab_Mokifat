<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2A5298"/>
    </linearGradient>
    <linearGradient id="snowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="80" cy="80" r="76" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle ring decoration -->
  <circle cx="80" cy="80" r="68" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- AC Unit body -->
  <rect x="28" y="38" width="104" height="38" rx="9" fill="white" opacity="0.95"/>
  <!-- Vent lines -->
  <rect x="36" y="52" width="56" height="3" rx="1.5" fill="#B0D4F0"/>
  <rect x="36" y="59" width="46" height="3" rx="1.5" fill="#B0D4F0"/>
  <rect x="36" y="66" width="52" height="3" rx="1.5" fill="#B0D4F0"/>
  <!-- Status dot -->
  <circle cx="118" cy="47" r="5" fill="#22C55E"/>
  <circle cx="118" cy="47" r="2.5" fill="#4ADE80"/>
  <!-- Display panel -->
  <rect x="94" y="50" width="22" height="14" rx="4" fill="#1E3A5F" opacity="0.85"/>
  <circle cx="100" cy="57" r="2" fill="#38BDF8" opacity="0.7"/>
  <circle cx="106" cy="57" r="2" fill="#38BDF8" opacity="0.4"/>
  <circle cx="112" cy="57" r="2" fill="#38BDF8" opacity="0.2"/>

  <!-- Stand pipe -->
  <rect x="77" y="76" width="5" height="9" rx="2.5" fill="#94A3B8"/>
  <rect x="68" y="83" width="23" height="4" rx="2" fill="#94A3B8"/>

  <!-- Snowflake -->
  <g transform="translate(80, 118)" filter="url(#glow)">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="url(#snowGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="url(#snowGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12.7" y1="-12.7" x2="12.7" y2="12.7" stroke="url(#snowGrad)" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="12.7" y1="-12.7" x2="-12.7" y2="12.7" stroke="url(#snowGrad)" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Branch tips -->
    <line x1="-5" y1="-13" x2="0" y2="-18" stroke="url(#snowGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="5"  y1="-13" x2="0" y2="-18" stroke="url(#snowGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="13"  x2="0" y2="18"  stroke="url(#snowGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="5"  y1="13"  x2="0" y2="18"  stroke="url(#snowGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="-5" x2="-13" y2="0" stroke="url(#snowGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="5"  x2="-13" y2="0" stroke="url(#snowGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="18"  y1="-5" x2="13"  y2="0" stroke="url(#snowGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="18"  y1="5"  x2="13"  y2="0" stroke="url(#snowGrad)" stroke-width="2" stroke-linecap="round"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="4" fill="#38BDF8"/>
    <circle cx="0" cy="0" r="2" fill="white"/>
  </g>
</svg>
