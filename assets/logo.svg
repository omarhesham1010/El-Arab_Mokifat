<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" width="420" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2A5298"/>
    </linearGradient>
    <linearGradient id="acGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E2F4FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="snowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
    <linearGradient id="acuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect x="2" y="2" width="416" height="156" rx="28" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Decorative subtle arc top-right -->
  <ellipse cx="390" cy="10" rx="80" ry="80" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="30"/>
  <ellipse cx="390" cy="10" rx="55" ry="55" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="20"/>

  <!-- ===== AC UNIT ICON (right side, RTL) ===== -->
  <!-- Outer unit body -->
  <rect x="22" y="38" width="88" height="52" rx="10" fill="url(#acGrad)" filter="url(#shadow)"/>
  <!-- Vent lines -->
  <rect x="30" y="54" width="52" height="3" rx="1.5" fill="#B0D4F0"/>
  <rect x="30" y="62" width="44" height="3" rx="1.5" fill="#B0D4F0"/>
  <rect x="30" y="70" width="48" height="3" rx="1.5" fill="#B0D4F0"/>
  <!-- Status dot green -->
  <circle cx="96" cy="46" r="4" fill="#22C55E"/>
  <circle cx="96" cy="46" r="2" fill="#4ADE80"/>
  <!-- Display panel -->
  <rect x="74" y="52" width="28" height="16" rx="4" fill="#1E3A5F" opacity="0.85"/>
  <text x="88" y="64" font-family="monospace" font-size="8" fill="#38BDF8" text-anchor="middle">18°</text>

  <!-- Indoor unit pipe/stand -->
  <rect x="58" y="90" width="4" height="12" rx="2" fill="#94A3B8"/>
  <rect x="50" y="100" width="20" height="4" rx="2" fill="#94A3B8"/>

  <!-- ===== SNOWFLAKE (center icon area) ===== -->
  <g transform="translate(66, 118)" filter="url(#glow)">
    <!-- Main cross -->
    <line x1="0" y1="-14" x2="0" y2="14" stroke="url(#snowGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="url(#snowGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Diagonal cross -->
    <line x1="-9.9" y1="-9.9" x2="9.9" y2="9.9" stroke="url(#snowGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="9.9" y1="-9.9" x2="-9.9" y2="9.9" stroke="url(#snowGrad)" stroke-width="2" stroke-linecap="round"/>
    <!-- Tips on main axis -->
    <line x1="-4" y1="-10" x2="0" y2="-14" stroke="url(#snowGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="4" y1="-10" x2="0" y2="-14" stroke="url(#snowGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-4" y1="10" x2="0" y2="14" stroke="url(#snowGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="4" y1="10" x2="0" y2="14" stroke="url(#snowGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-14" y1="-4" x2="-10" y2="0" stroke="url(#snowGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-14" y1="4" x2="-10" y2="0" stroke="url(#snowGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="14" y1="-4" x2="10" y2="0" stroke="url(#snowGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="14" y1="4" x2="10" y2="0" stroke="url(#snowGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#38BDF8"/>
    <circle cx="0" cy="0" r="1.5" fill="white"/>
  </g>

  <!-- Divider line between icon and text -->
  <line x1="128" y1="30" x2="128" y2="130" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ===== TEXT AREA ===== -->
  <!-- Main title -->
  <text
    x="275"
    y="78"
    font-family="'Tajawal', 'Arial', sans-serif"
    font-size="32"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="0.5"
  >مؤسسة العرب</text>

  <!-- Accent underline -->
  <rect x="175" y="85" width="200" height="3" rx="1.5" fill="url(#snowGrad)" opacity="0.8"/>

  <!-- Subtitle -->
  <text
    x="275"
    y="112"
    font-family="'Tajawal', 'Arial', sans-serif"
    font-size="17"
    font-weight="500"
    fill="rgba(255,255,255,0.75)"
    text-anchor="middle"
    letter-spacing="0.5"
  >للمكيفات المستعملة • الرياض</text>

  <!-- Small decorative dots -->
  <circle cx="152" cy="80" r="3" fill="#38BDF8" opacity="0.6"/>
  <circle cx="398" cy="80" r="3" fill="#38BDF8" opacity="0.6"/>
  <circle cx="152" cy="92" r="2" fill="#38BDF8" opacity="0.3"/>
  <circle cx="398" cy="92" r="2" fill="#38BDF8" opacity="0.3"/>
</svg>
