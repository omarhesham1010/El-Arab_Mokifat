<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2A5298"/>
    </linearGradient>
    <linearGradient id="snow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- AC unit body -->
  <rect x="14" y="18" width="72" height="30" rx="7" fill="white" opacity="0.95"/>
  <!-- Vent lines -->
  <rect x="20" y="27" width="38" height="2.5" rx="1.2" fill="#B0D4F0"/>
  <rect x="20" y="33" width="32" height="2.5" rx="1.2" fill="#B0D4F0"/>
  <rect x="20" y="39" width="35" height="2.5" rx="1.2" fill="#B0D4F0"/>
  <!-- Status dot -->
  <circle cx="78" cy="25" r="4" fill="#22C55E"/>
  <circle cx="78" cy="25" r="2" fill="#4ADE80"/>
  <!-- Display -->
  <rect x="60" y="28" width="20" height="12" rx="3" fill="#1E3A5F" opacity="0.85"/>
  <text x="70" y="38" font-family="monospace" font-size="6" fill="#38BDF8" text-anchor="middle">18°</text>

  <!-- Pipe -->
  <rect x="47" y="48" width="3" height="6" rx="1.5" fill="#94A3B8"/>
  <rect x="42" y="53" width="13" height="3" rx="1.5" fill="#94A3B8"/>

  <!-- Snowflake -->
  <g transform="translate(50, 75)">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="url(#snow)" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="url(#snow)" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="-9.9" y1="-9.9" x2="9.9" y2="9.9" stroke="url(#snow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="9.9" y1="-9.9" x2="-9.9" y2="9.9" stroke="url(#snow)" stroke-width="2" stroke-linecap="round"/>
    <!-- Tips -->
    <line x1="-4" y1="-10" x2="0" y2="-14" stroke="url(#snow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="-10" x2="0" y2="-14" stroke="url(#snow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4" y1="10" x2="0" y2="14" stroke="url(#snow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="10" x2="0" y2="14" stroke="url(#snow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-14" y1="-4" x2="-10" y2="0" stroke="url(#snow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-14" y1="4" x2="-10" y2="0" stroke="url(#snow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="-4" x2="10" y2="0" stroke="url(#snow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="4" x2="10" y2="0" stroke="url(#snow)" stroke-width="2" stroke-linecap="round"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="3.5" fill="#38BDF8"/>
    <circle cx="0" cy="0" r="1.8" fill="white"/>
  </g>
</svg>
